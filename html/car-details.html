<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoMarket – Car Details</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Auto<span>Market</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cars.html" class="active">Cars</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="car-detail-page section-padding">
    <div class="container">
      <a href="cars.html" class="back-btn animate-fade-up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </a>
      <div class="car-detail-grid" id="car-detail"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-brand">
        <a href="index.html" class="logo">Auto<span>Market</span></a>
        <p>Your trusted partner for premium automotive excellence since 2024.</p>
      </div>
      <div class="footer-contact">
        <h4>Contact</h4>
        <p>1234 Luxury Lane</p>
        <p>Beverly Hills, CA 90210</p>
        <p>+1 (555) 123-4567</p>
        <p>info@automarket.com</p>
      </div>
      <div class="footer-social">
        <h4>Follow Us</h4>
        <div class="social-links">
          <a href="#" class="social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5zm4.25 3a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11zm0 1.5a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm5.75-.75a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>
          </a>
          <a href="#" class="social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95C18.05 21.45 22 17.19 22 12z"/></svg>
          </a>
          <a href="#" class="social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.46 6c-.77.35-1.6.58-2.46.69.88-.53 1.56-1.37 1.88-2.38-.83.5-1.75.85-2.72 1.05C18.37 4.5 17.26 4 16 4c-2.35 0-4.27 1.92-4.27 4.29 0 .34.04.67.11.98C8.28 9.09 5.11 7.38 3 4.79c-.37.63-.58 1.37-.58 2.15 0 1.49.75 2.81 1.91 3.56-.71 0-1.37-.2-1.95-.5v.03c0 2.08 1.48 3.82 3.44 4.21a4.22 4.22 0 0 1-1.93.07 4.28 4.28 0 0 0 4 2.98 8.521 8.521 0 0 1-5.33 1.84c-.34 0-.68-.02-1.02-.06C3.44 20.29 5.7 21 8.12 21 16 21 20.33 14.46 20.33 8.79c0-.19 0-.37-.01-.56.84-.6 1.56-1.36 2.14-2.23z"/></svg>
          </a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 AutoMarket. All rights reserved.</p>
    </div>
  </footer>

  <script src="../js/script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const carId = parseInt(params.get('id'));
    const car = carsData.find(c => c.id === carId);
    const container = document.getElementById('car-detail');

    if (!car) {
      container.innerHTML = '<p style="color:#fff;text-align:center;padding:4rem">Car not found. <a href="cars.html" style="color:#e31c25">Go back</a></p>';
    } else {
      document.title = 'AutoMarket – ' + car.name;
      container.innerHTML = `
        <div class="car-images animate-fade-up">
          <div class="main-image">
            <img src="${car.images[0]}" alt="${car.name}" id="main-img"/>
          </div>
          <div class="thumb-strip">
            ${car.images.map((img, i) => `<img src="${img}" alt="thumb" class="thumb ${i===0?'active':''}" onclick="switchImage('${img}', this)"/>`).join('')}
          </div>
        </div>
        <div class="car-info animate-fade-up" style="animation-delay:.15s">
          <span class="car-brand-tag">${car.brand}</span>
          <h1>${car.name}</h1>
          <p class="car-price-big">$${car.price.toLocaleString()}</p>
          <p class="car-desc">${car.description}</p>
          <div class="specs-grid">
            <h3>Specifications</h3>
            <div class="specs-list">
              <div class="spec-item"><span class="spec-label">Year</span><span class="spec-value">${car.year}</span></div>
              <div class="spec-item"><span class="spec-label">Engine</span><span class="spec-value">${car.engine}</span></div>
              <div class="spec-item"><span class="spec-label">Fuel Type</span><span class="spec-value">${car.fuel}</span></div>
              <div class="spec-item"><span class="spec-label">Transmission</span><span class="spec-value">${car.transmission}</span></div>
              <div class="spec-item"><span class="spec-label">Mileage</span><span class="spec-value">${car.mileage}</span></div>
              <div class="spec-item"><span class="spec-label">Brand</span><span class="spec-value">${car.brand}</span></div>
            </div>
          </div>
          <div class="car-actions">
            <a href="contact.html" class="btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              Contact Seller
            </a>
            <a href="tel:+15551234567" class="btn-outline">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.64 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.55 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.54a16 16 0 0 0 6.63 6.63l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              Call Now
            </a>
          </div>
        </div>
      `;
    }

    function switchImage(src, el) {
      document.getElementById('main-img').src = src;
      document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    initAnimations();
  </script>
</body>
</html>
